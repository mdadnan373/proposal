<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Special Proposal 💍</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
        text-align: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        overflow-x: hidden;
        min-height: 100vh;
    }

    /* Setup Form Styles */
    #setupForm {
        background: rgba(255, 255, 255, 0.9);
        color: #333;
        width: 90%;
        max-width: 500px;
        margin: 50px auto;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    #setupForm h2 {
        font-family: 'Great Vibes', cursive;
        font-size: 40px;
        color: #ff2e63;
        margin-top: 0;
    }
    .input-group {
        margin-bottom: 15px;
        text-align: left;
    }
    .input-group label {
        font-size: 14px;
        font-weight: 600;
        color: #555;
    }
    .input-group input, .input-group textarea {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-family: 'Poppins', sans-serif;
        box-sizing: border-box;
    }

    /* Proposal Screen Styles */
    .container {
        margin-top: 60px;
        color: white;
    }
    h1 {
        font-family: 'Great Vibes', cursive;
        font-size: 60px;
        animation: fadeIn 2s ease;
        padding: 0 20px;
    }
    p.letter-text {
        font-size: 20px;
        width: 80%;
        max-width: 600px;
        margin: auto;
        line-height: 1.6;
    }
    button {
        padding: 15px 30px;
        margin: 10px;
        border: none;
        border-radius: 30px;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
        font-family: 'Poppins', sans-serif;
        font-weight: 600;
    }
    .btn-create {
        background: #ff2e63;
        color: white;
        width: 100%;
        margin: 20px 0 0 0;
    }
    .yes {
        background: #ff2e63;
        color: white;
    }
    .action-btn {
        background: white;
        color: #ff2e63;
    }
    button:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    #result {
        display: none;
        margin-top: 40px;
        padding-bottom: 50px;
    }
    img {
        width: 250px;
        height: 250px;
        object-fit: cover;
        border-radius: 20px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        margin: 10px;
    }
    .gallery {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 20px;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-20px) }
        to { opacity: 1; transform: translateY(0) }
    }
    .heart {
        position: absolute;
        width: 20px;
        height: 20px;
        background: red;
        clip-path: polygon(50% 0%, 61% 13%, 75% 13%, 87% 25%, 87% 37%, 75% 50%, 50% 80%, 25% 50%, 13% 37%, 13% 25%, 25% 13%, 39% 13%);
        animation: float 5s linear infinite;
        z-index: -1;
    }
    @keyframes float {
        0% { transform: translateY(0) scale(1); opacity: 1;}
        100% { transform: translateY(-800px) scale(1.5); opacity: 0;}
    }
    .countdown {
        margin-top: 20px;
        font-size: 20px;
        font-weight: bold;
    }
</style>
</head>
<body>

<div id="setupForm">
    <h2>Customize Proposal</h2>
    
    <div class="input-group">
        <label>Your Name</label>
        <input type="text" id="inputYourName" value="His Name">
    </div>
    <div class="input-group">
        <label>Partner's Name</label>
        <input type="text" id="inputPartnerName" value="Her Name">
    </div>
    <div class="input-group">
        <label>Date You Met</label>
        <input type="date" id="inputDate" value="2025-01-27">
    </div>
    <div class="input-group">
        <label>Love Letter</label>
        <textarea id="inputLetter" rows="5">From the moment I met you, my life became brighter.
Your smile gives me peace, your presence gives me happiness.

Every day I imagine a future where we grow together,
support each other, and build a beautiful life.

So today I want to ask the most important question...</textarea>
    </div>
    <div class="input-group">
        <label>Music Link (MP3 URL)</label>
        <input type="text" id="inputMusic" value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
    </div>
    <div class="input-group">
        <label>Romantic Images (URLs)</label>
        <input type="text" id="inputImg1" value="https://images.unsplash.com/photo-1518192161663-5a42365d4b4c?w=500" placeholder="Image 1 URL">
        <input type="text" id="inputImg2" value="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=500" placeholder="Image 2 URL">
        <input type="text" id="inputImg3" value="https://images.unsplash.com/photo-1494774157365-9e04c6720e47?w=500" placeholder="Image 3 URL">
    </div>
    
    <button class="btn-create" onclick="startProposal()">Generate & Preview Proposal 💖</button>
</div>

<div id="proposalContent" style="display:none;">

    <audio id="bgMusic" loop>
        <source id="audioSource" src="" type="audio/mp3">
    </audio>

    <div class="container">
        <h1 id="title"></h1>
        <p id="letter" class="letter-text"></p>
        <br>
        <button class="yes" onclick="sayYes()">Yes, I Do ❤️</button>

        <div class="countdown" id="countdown"></div>

        <div id="result">
            <h2 id="finalText"></h2>

            <div class="gallery" id="gallery">
                <img id="displayImg1" src="">
                <img id="displayImg2" src="">
                <img id="displayImg3" src="">
            </div>

            <video width="320" height="240" controls style="border-radius:15px; margin-bottom: 20px;">
                <source src="memory.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <br>
            <button class="action-btn" onclick="downloadCertificate()">Download Love Certificate 💌</button>
            <button class="action-btn" onclick="shareWhatsApp()">Share on WhatsApp 📲</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
// Global variables
let yourName = "";
let partnerName = "";
let firstMetDate = "";
let countdownInterval;

// Start Proposal Function (Transitions from Setup to View)
function startProposal() {
    // 1. Grab values from the setup form
    yourName = document.getElementById("inputYourName").value;
    partnerName = document.getElementById("inputPartnerName").value;
    firstMetDate = document.getElementById("inputDate").value;
    
    let letterText = document.getElementById("inputLetter").value;
    let musicUrl = document.getElementById("inputMusic").value;
    let img1 = document.getElementById("inputImg1").value;
    let img2 = document.getElementById("inputImg2").value;
    let img3 = document.getElementById("inputImg3").value;

    // 2. Inject values into the proposal DOM
    document.getElementById("title").innerHTML = partnerName + ", Will You Marry Me? 💍";
    document.getElementById("letter").innerHTML = letterText.replace(/\n/g, "<br>"); // Preserves line breaks
    
    document.getElementById("displayImg1").src = img1;
    document.getElementById("displayImg2").src = img2;
    document.getElementById("displayImg3").src = img3;

    // 3. Load and play music (Autoplay works here because the user clicked a button!)
    const audio = document.getElementById("bgMusic");
    document.getElementById("audioSource").src = musicUrl;
    audio.load();
    audio.play();

    // 4. Start Countdown
    updateCountdown();
    countdownInterval = setInterval(updateCountdown, 3600000); // Update every hour

    // 5. Hide form, show proposal
    document.getElementById("setupForm").style.display = "none";
    document.getElementById("proposalContent").style.display = "block";
    
    // 6. Start floating hearts background
    setInterval(createHearts, 500);
}

// Confetti hearts animation
function createHearts(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
}

// Countdown timer logic
function updateCountdown(){
    if(!firstMetDate) return;
    const now = new Date();
    const firstDate = new Date(firstMetDate);
    const diffTime = Math.abs(now - firstDate);
    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
    document.getElementById("countdown").innerText = `Days since we met: ${diffDays} ❤️`;
}

// Yes button logic
function sayYes(){
    document.getElementById("result").style.display = "block";

    document.getElementById("finalText").innerHTML = 
    partnerName + " ❤️ " + yourName + "<br>Forever Starts Today! 🎉";

    confetti({
        particleCount: 200,
        spread: 120,
        origin: { y: 0.6 }
    });

    setTimeout(() => alert("I love you forever ❤️"), 1000);
}

// Generate PDF certificate
function downloadCertificate(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFontSize(30);
    doc.text("She Said Yes! 💌", 20, 40);
    doc.setFontSize(20);
    doc.text(`This certificate celebrates the love between`, 20, 60);
    doc.text(`${yourName} & ${partnerName}`, 20, 70);
    doc.save("LoveCertificate.pdf");
}

// WhatsApp share
function shareWhatsApp(){
    const text = `Hey ${partnerName}, check out our special proposal! 💍`;
    const url = encodeURIComponent(window.location.href);
    window.open(`https://wa.me/?text=${text} ${url}`);
}

</script>
</body>
</html>
